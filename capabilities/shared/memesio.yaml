        method: GET
        path: /api/v1/agents/{agentId}
        description: Get a Single User-Owned Agent Profile
        inputParameters:
        - name: agentId
          in: path
          type: string
          required: true
          description: agentId parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch-agents-agent-id
        method: PATCH
        path: /api/v1/agents/{agentId}
        description: Update Agent Profile Defaults (Prompt, Watermark, Style, Locale, Status)
        body:
          type: json
          description: JSON body.
