naftiko: 1.0.0-alpha1
info:
  label: Memesio API
  description: Contract baseline for AI jobs, trend alerts, collaboration, and billing surfaces.
  tags:
  - Memesio
  - Memes
  - Image Generation
  - Templates
  - AI Captions
  - Video
  - Face Swap
  - Background Remove
  - Agents
  - Billing
  - Analytics
  created: '2026-05-16'
  modified: '2026-05-16'
binds:
- namespace: env
  keys:
    MEMESIO_API_KEY: MEMESIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: memesio
    baseUri: https://memesio.com/api
    description: Memesio meme creation, template discovery, AI generation, and agent identity API.
    authentication:
      type: apikey
      in: header
      name: x-agent-api-key
      value: '{{env.MEMESIO_API_KEY}}'
      description: Developer or agent key. Public/free routes accept anonymous calls.
    resources:
    - name: agent-infra
      path: /
      description: Memesio agent-infra operations.
      operations:
      - name: get-agents
        method: GET
        path: /api/v1/agents
        description: List User-Owned Agent Profiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post-agents
        method: POST
        path: /api/v1/agents
        description: Create a User-Owned Agent Profile
        body:
          type: json
          description: JSON body.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post-agents-bootstrap
        method: POST
        path: /api/v1/agents/bootstrap
        description: Bootstrap a Standalone Agent Account with an Immediately Usable Approved Key
        body:
          type: json
          description: JSON body.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post-agents-create-agent
