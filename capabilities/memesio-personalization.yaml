  - type: http
    namespace: memesio-personalization
    baseUri: ''
    description: Memesio API Contracts — personalization business capability. Self-contained, no shared references.
    resources:
    - name: api-alerts-feedback
      path: /api/alerts/feedback
      operations:
      - name: get
        method: GET
        description: List Stored Trend Feedback Actions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: actorId
          in: query
          type: string
        - name: limit
          in: query
          type: integer
      - name: post
        method: POST
        description: Record Trend Feedback Action and Update Preference Vector
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-alerts-preferences
      path: /api/alerts/preferences
      operations:
      - name: get
        method: GET
        description: Get Trend Preference Vector for Actor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: actorId
          in: query
          type: string
          required: true
      - name: post
        method: POST
        description: Upsert Trend Preference Vector from Explicit Interests and Behavior Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
