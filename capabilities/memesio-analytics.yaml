      operations:
      - method: GET
        name: get
        description: Get Feature Adoption Dashboard Spec by Plan and Segment (Looker)
        call: memesio-analytics.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/analytics/experiments/templates
      name: api-analytics-experiments-templates
