        - name: projectId
          in: query
          type: string
          required: true
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
      - name: post
        method: POST
        description: Create Collaboration Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
