naftiko: 1.0.0-alpha2
info:
  label: Memesio API Contracts — notifications
  description: 'Memesio API Contracts — notifications. 2 operations. Lead operation: Retrieve Latest Delivery Report or Refresh
    Trigger-to-Delivery Fanout for in-App Inbox, Push (PWA), and Email Digest. Self-contained Naftiko capability covering
    one Memesio business surface.'
  tags:
  - Memesio
  - notifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MEMESIO_API_KEY: MEMESIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: memesio-notifications
    baseUri: ''
    description: Memesio API Contracts — notifications business capability. Self-contained, no shared references.
    resources:
    - name: api-alerts-delivery
      path: /api/alerts/delivery
      operations:
      - name: get
        method: GET
        description: Retrieve Latest Delivery Report or Refresh Trigger-to-Delivery Fanout for in-App Inbox, Push (PWA), and
          Email Digest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: refresh
          in: query
          type: boolean
      - name: post
        method: POST
        description: Execute Trend Alert Delivery Fanout and Return P95 Delivery Latency Against the 5-Minute SLA Target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: x-developer-api-key
      value: '{{env.MEMESIO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: memesio-notifications-rest
    port: 8080
    description: REST adapter for Memesio API Contracts — notifications. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/alerts/delivery
      name: api-alerts-delivery
      description: REST surface for api-alerts-delivery.
      operations:
      - method: GET
        name: get
        description: Retrieve Latest Delivery Report or Refresh Trigger-to-Delivery Fanout for in-App Inbox, Push (PWA), and
          Email Digest
        call: memesio-notifications.get
        with:
          refresh: rest.refresh
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Execute Trend Alert Delivery Fanout and Return P95 Delivery Latency Against the 5-Minute SLA Target
        call: memesio-notifications.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: memesio-notifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Memesio API Contracts — notifications. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-latest-delivery-report-refresh
      description: Retrieve Latest Delivery Report or Refresh Trigger-to-Delivery Fanout for in-App Inbox, Push (PWA), and
        Email Digest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: memesio-notifications.get
      with:
        refresh: tools.refresh
      outputParameters:
      - type: object
        mapping: $.
    - name: execute-trend-alert-delivery-fanout
      description: Execute Trend Alert Delivery Fanout and Return P95 Delivery Latency Against the 5-Minute SLA Target
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: memesio-notifications.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
