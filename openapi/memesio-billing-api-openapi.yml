openapi: 3.1.0
info:
  title: Memesio API Contracts agent-infra billing API
  version: 0.1.0
  description: Contract baseline for AI jobs, trend alerts, collaboration, and billing surfaces.
servers:
- url: /
tags:
- name: billing
paths:
  /api/ai/jobs/{jobId}/complete:
    post:
      summary: Complete AI Job and Log Metered AI Cost
      tags:
      - billing
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - workerId
              properties:
                workerId:
                  type: string
                output:
                  type: object
                  additionalProperties: true
                estimatedCostUsd:
                  type: number
                  minimum: 0
                providerId:
                  type: string
      responses:
        '200':
          description: Completed job
        '404':
          description: Not found or not running
  /api/billing/usage:
    get:
      summary: Get Billing Usage Snapshot
      tags:
      - billing
      parameters:
      - name: workspaceId
        in: query
        schema:
          type: string
      - name: windowDays
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 365
      responses:
        '200':
          description: Usage snapshot
components:
  securitySchemes:
    DeveloperApiKeyAuth:
      type: apiKey
      in: header
      name: x-developer-api-key
      description: 'Optional higher-rate free-tier auth. You can also send the key as Authorization: Bearer <key>.'
    AgentApiKeyAuth:
      type: apiKey
      in: header
      name: x-agent-api-key
      description: 'Agent auth for free endpoints and agent-admin routes. You can also send the key as Authorization: Bearer <key>.'
