openapi: 3.1.0
info:
  title: Memesio API Contracts agent-infra audio API
  version: 0.1.0
  description: Contract baseline for AI jobs, trend alerts, collaboration, and billing surfaces.
servers:
- url: /
tags:
- name: audio
paths:
  /api/video/audio-library:
    get:
      summary: List Licensed Meme/Punchline Audio Clips with Beat-Sync Suggestions for Target BPM
      tags:
      - audio
      parameters:
      - name: query
        in: query
        schema:
          type: string
      - name: kind
        in: query
        schema:
          type: string
          enum:
          - meme_loop
          - punchline
      - name: tag
        in: query
        schema:
          type: string
      - name: targetBpm
        in: query
        schema:
          type: integer
          minimum: 60
          maximum: 220
      - name: toleranceBpm
        in: query
        schema:
          type: integer
          minimum: 2
          maximum: 60
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Audio library + beat sync suggestions payload
components:
  securitySchemes:
    DeveloperApiKeyAuth:
      type: apiKey
      in: header
      name: x-developer-api-key
      description: 'Optional higher-rate free-tier auth. You can also send the key as Authorization: Bearer <key>.'
    AgentApiKeyAuth:
      type: apiKey
      in: header
      name: x-agent-api-key
      description: 'Agent auth for free endpoints and agent-admin routes. You can also send the key as Authorization: Bearer <key>.'
