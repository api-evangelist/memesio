openapi: 3.1.0
info:
  title: Memesio API Contracts agent-infra background-remove API
  version: 0.1.0
  description: Contract baseline for AI jobs, trend alerts, collaboration, and billing surfaces.
servers:
- url: /
tags:
- name: background-remove
paths:
  /api/ai/background-remove:
    post:
      summary: Run One-Click Background Removal for Image or Video Frame with Edge Refinement Slider and Optional Mask Brush Edits
      tags:
      - background-remove
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - sourceAssetUrl
              - width
              - height
              properties:
                sourceAssetUrl:
                  type: string
                mediaType:
                  type: string
                  enum:
                  - image
                  - video_frame
                frameTimeMs:
                  type: number
                  minimum: 0
                width:
                  type: number
                  minimum: 1
                height:
                  type: number
                  minimum: 1
                edgeRefinement:
                  type: number
                  minimum: 0
                  maximum: 1
                brushEdits:
                  type: array
                  items:
                    type: object
                    required:
                    - mode
                    - x
                    - y
                    - radius
                    properties:
                      mode:
                        type: string
                        enum:
                        - add
                        - erase
                      x:
                        type: number
                      y:
                        type: number
                      radius:
                        type: number
                        minimum: 1
                      intensity:
                        type: number
                        minimum: 0.1
                        maximum: 1
      responses:
        '200':
          description: Background removal result and mask stats
        '400':
          description: Validation error
components:
  securitySchemes:
    DeveloperApiKeyAuth:
      type: apiKey
      in: header
      name: x-developer-api-key
      description: 'Optional higher-rate free-tier auth. You can also send the key as Authorization: Bearer <key>.'
    AgentApiKeyAuth:
      type: apiKey
      in: header
      name: x-agent-api-key
      description: 'Agent auth for free endpoints and agent-admin routes. You can also send the key as Authorization: Bearer <key>.'
