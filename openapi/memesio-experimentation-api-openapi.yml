openapi: 3.1.0
info:
  title: Memesio API Contracts agent-infra experimentation API
  version: 0.1.0
  description: Contract baseline for AI jobs, trend alerts, collaboration, and billing surfaces.
servers:
- url: /
tags:
- name: experimentation
paths:
  /api/analytics/experiments/templates:
    get:
      summary: Get Pricing/Paywall Experiment Analysis Templates
      tags:
      - experimentation
      parameters:
      - name: templateId
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Pricing experiment templates payload
  /api/growth/experiments/decision:
    get:
      summary: Decision Service for Growth Experiments with Optional Exposure Logging
      tags:
      - experimentation
      parameters:
      - name: actorId
        in: query
        required: true
        schema:
          type: string
      - name: surface
        in: query
        schema:
          type: string
      - name: logExposure
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Experiment decisions payload
        '400':
          description: Missing actor id
    post:
      summary: Request Decisions or Query Exposure History for Growth Experiments
      tags:
      - experimentation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  type: string
                  enum:
                  - decide
                  - history
                actorId:
                  type: string
                surface:
                  type: string
                logExposure:
                  type: boolean
                limit:
                  type: integer
                  minimum: 1
                  maximum: 2000
      responses:
        '200':
          description: Exposure history payload
        '201':
          description: Decision payload
        '400':
          description: Validation error
components:
  securitySchemes:
    DeveloperApiKeyAuth:
      type: apiKey
      in: header
      name: x-developer-api-key
      description: 'Optional higher-rate free-tier auth. You can also send the key as Authorization: Bearer <key>.'
    AgentApiKeyAuth:
      type: apiKey
      in: header
      name: x-agent-api-key
      description: 'Agent auth for free endpoints and agent-admin routes. You can also send the key as Authorization: Bearer <key>.'
