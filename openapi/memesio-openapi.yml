openapi: 3.1.0
info:
  title: Memesio API Contracts
  version: 0.1.0
  description: Contract baseline for AI jobs, trend alerts, collaboration, and billing surfaces.
servers:
- url: /
paths:
  /api/ai/jobs:
    get:
      summary: List AI Jobs
      tags:
      - ai-jobs
      parameters:
      - name: status
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 50
      responses:
        '200':
          description: AI job list
    post:
      summary: Submit AI Job
      tags:
      - ai-jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiJobSubmitRequest'
      responses:
        '201':
          description: AI job created
  /api/ai/jobs/{jobId}:
    get:
      summary: Get AI Job Status
      tags:
      - ai-jobs
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: AI job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJob'
        '404':
          description: Not found
  /api/ai/jobs/{jobId}/cancel:
    post:
      summary: Cancel AI Job
      tags:
      - ai-jobs
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 300
      responses:
        '200':
          description: Canceled
        '404':
          description: Not found
  /api/ai/jobs/{jobId}/complete:
    post:
      summary: Complete AI Job and Log Metered AI Cost
      tags:
      - ai-jobs
      - billing
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - workerId
              properties:
                workerId:
                  type: string
                output:
                  type: object
                  additionalProperties: true
                estimatedCostUsd:
                  type: number
                  minimum: 0
                providerId:
                  type: string
      responses:
        '200':
          description: Completed job
        '404':
          description: Not found or not running
  /api/ai/edit-history:
    get:
      summary: List or Compare Versioned AI Edit History for a Layer
      tags:
      - ai-jobs
      - history
      parameters:
      - name: projectId
        in: query
        required: true
        schema:
          type: string
      - name: layerId
        in: query
        required: true
        schema:
          type: string
      - name: mode
        in: query
        schema:
          type: string
          enum:
          - list
          - compare
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 500
      - name: fromVersionId
        in: query
        schema:
          type: string
      - name: toVersionId
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Layer history payload
        '404':
          description: Versions not found for comparison
    post:
      summary: Record or Rollback Versioned AI Edit State for a Layer
      tags:
      - ai-jobs
      - history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              - projectId
              - layerId
              properties:
                action:
                  type: string
                  enum:
                  - record
                  - rollback
                projectId:
                  type: string
                layerId:
                  type: string
                layerType:
                  type: string
                  enum:
                  - face_swap
                  - background_remove
                  - caption
                beforeState:
                  type: object
                  additionalProperties: true
                afterState:
                  type: object
                  additionalProperties: true
                versionId:
                  type: string
                actorId:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Rollback payload
        '201':
          description: Version recorded
        '400':
          description: Validation error
        '404':
          description: Version not found
  /api/ai/captions/scene:
    post:
      summary: Run Scene-Understanding Pipeline to Extract Entities, Tone Cues, and Trend References from Canvas + Template Metadata
      tags:
      - ai-captions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - canvasText
              properties:
                canvasText:
                  type: array
                  items:
                    type: string
                templateName:
                  type: string
                templateDescription:
                  type: string
                templateTags:
                  type: array
                  items:
                    type: string
                trendSignals:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Scene understanding payload
        '400':
          description: Validation error
  /api/ai/captions/tone-presets:
    get:
      summary: List Default + Custom Brand Tone Presets
      tags:
      - ai-captions
      parameters:
      - name: locale
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Tone preset list payload
    post:
      summary: Create or Update Custom Brand Tone Preset
      tags:
      - ai-captions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                locale:
                  type: string
                voiceRules:
                  type: array
                  items:
                    type: string
                blockedTerms:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Tone preset saved
        '400':
          description: Validation error
  /api/ai/captions/prompt:
    post:
      summary: Build Caption Prompt with Optional Inferred Scene Context and Locale Auto-Detect (En, Es, Pt-Br, Hi)
      tags:
      - ai-captions
      responses:
        '200':
          description: Caption prompt payload
        '400':
          description: Validation error
  /api/ai/captions/generate:
    get:
      summary: Read the Current Actor's Daily Caption Reroll Quota and Reset Window
      tags:
      - ai-captions
      - auth
      security:
      - AgentApiKeyAuth: []
      - {}
      responses:
        '200':
          description: Current actor caption reroll quota snapshot
    post:
      summary: Generate Caption Reroll Options with Locale-Aware Output, Ranking, Inline Safety Highlights, and Full Caption-Set Alternatives
      tags:
      - ai-captions
      security:
      - AgentApiKeyAuth: []
      - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - tone
              properties:
                tone:
                  type: string
                memeId:
                  type: string
                memeSlug:
                  type: string
                ownerToken:
                  type: string
                sceneSummary:
                  type: string
                entities:
                  type: array
                  items:
                    type: string
                toneCues:
                  type: array
                  items:
                    type: string
                trendReferences:
                  type: array
                  items:
                    type: string
                trendKeywords:
                  type: array
                  items:
                    type: string
                rewriteNote:
                  type: string
                referenceCaptions:
                  type: array
                  items:
                    type: string
                  maxItems: 7
                captionCount:
                  type: integer
                  minimum: 1
                  maximum: 7
                optionCount:
                  type: integer
                  minimum: 1
                  maximum: 5
                variationOffset:
                  type: integer
                  minimum: 0
                  maximum: 99
      responses:
        '200':
          description: Caption generation + ranking payload with reroll quota snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  generationStrategy:
                    type: string
                    enum:
                    - openai
                    - heuristic
                  providerId:
                    type: string
                  fallbackUsed:
                    type: boolean
                  captionSets:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        score:
                          type: number
                        captions:
                          type: array
                          items:
                            type: object
                            properties:
                              text:
                                type: string
        '400':
          description: Validation error
        '429':
          description: Daily caption reroll quota exceeded
  /api/ai/captions/rewrite:
    post:
      summary: Rewrite Caption Text with Shorten/Punchier/Less-Offensive/Brand-Safe Tools and Return Diff Preview
      tags:
      - ai-captions
      security:
      - AgentApiKeyAuth: []
      - {}
      responses:
        '200':
          description: Caption rewrite payload
        '400':
          description: Validation error
  /api/ai/captions/rank:
    post:
      summary: Rank Caption Variants and Return Top Safe Selections
      tags:
      - ai-captions
      responses:
        '200':
          description: Caption ranking payload
        '400':
          description: Validation error
  /api/ai/captions/moderate:
    post:
      summary: Moderate Caption Candidates with Inline Highlights/Rationale and Enqueue Blocked Outputs
      tags:
      - ai-captions
      - moderation
      responses:
        '200':
          description: Caption moderation payload
        '400':
          description: Validation error
  /api/ai/memes/generate:
    get:
      summary: Read the Current Actor's Daily AI Meme Quota, Remaining Generations, and Next Action
      tags:
      - ai-providers
      - auth
      security:
      - DeveloperApiKeyAuth: []
      - AgentApiKeyAuth: []
      - {}
      responses:
        '200':
          description: Current actor AI quota snapshot
    post:
      summary: Select an Existing Meme Template, Generate Captions, and Return Editor-Ready Meme Variants
      tags:
      - ai-providers
      - ai-captions
      security:
      - DeveloperApiKeyAuth: []
      - AgentApiKeyAuth: []
      - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - prompt
              properties:
                mode:
                  type: string
                  enum:
                  - template
                prompt:
                  type: string
                  minLength: 1
                  maxLength: 500
                flow:
                  type: string
                  enum:
                  - text_to_meme
                captionSource:
                  type: string
                  enum:
                  - input
                  - prompt
                imageUrl:
                  type: string
                templateId:
                  type: string
                captions:
                  type: array
                  items:
                    type: string
                  maxItems: 6
                editableCaptions:
                  type: array
                  items:
                    $ref: '#/components/schemas/MemeCaption'
                  maxItems: 8
                tone:
                  type: string
                  enum:
                  - sarcastic
                  - deadpan
                  - wholesome
                  - absurd
                  - corporate
                  - dark-lite
                  - brand
                toneCues:
                  type: array
                  items:
                    type: string
                  maxItems: 6
                rewriteNote:
                  type: string
                  maxLength: 160
                allowHeuristicFallback:
                  type: boolean
                variantCount:
                  type: number
                  minimum: 1
                  maximum: 5
                preferredProviderId:
                  type: string
                  enum:
                  - hyperswitch_vision
                  - onnx_local
                  - openai_vision
                workspaceId:
                  type: string
                correlationId:
                  type: string
      responses:
        '200':
          description: Meme variant generation payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiMemeGenerationSucceededResponse'
        '400':
          description: Validation error
        '429':
          description: Daily AI quota exceeded
        '500':
          description: Provider execution failure
  /api/auth/signup:
    post:
      summary: Create Email/Password Account and Send Verification Email
      tags:
      - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                displayName:
                  type: string
                  maxLength: 80
      responses:
        '201':
          description: Account created and verification sent
        '400':
          description: Validation error
        '409':
          description: Email already registered
  /api/auth/resend-verification:
    post:
      summary: Resend Email Verification Link
      tags:
      - auth
      responses:
        '200':
          description: Verification email sent
        '400':
          description: Validation error
        '404':
          description: Account not found
        '409':
          description: Already verified
  /api/v1/agents:
    get:
      summary: List User-Owned Agent Profiles
      tags:
      - agent-infra
      responses:
        '200':
          description: Agent profile list payload
        '401':
          description: Authentication required
    post:
      summary: Create a User-Owned Agent Profile
      tags:
      - agent-infra
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                slug:
                  type: string
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                description:
                  type: string
                  maxLength: 1000
                websiteUrl:
                  type: string
                  maxLength: 2000
                systemPrompt:
                  type: string
                  maxLength: 2000
                watermarkText:
                  type: string
                  maxLength: 160
                stylePreset:
                  type: string
                  maxLength: 80
                locale:
                  type: string
                  maxLength: 40
      responses:
        '201':
          description: Agent profile created
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '409':
          description: Slug conflict
  /api/v1/agents/bootstrap:
    post:
      summary: Bootstrap a Standalone Agent Account with an Immediately Usable Approved Key
      tags:
      - agent-infra
      - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - handle
              - name
              properties:
                handle:
                  type: string
                  minLength: 3
                  maxLength: 80
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                description:
                  type: string
                  maxLength: 1000
                websiteUrl:
                  type: string
                  maxLength: 2000
                systemPrompt:
                  type: string
                  maxLength: 2000
                watermarkText:
                  type: string
                  maxLength: 160
                stylePreset:
                  type: string
                  maxLength: 80
                locale:
                  type: string
                  maxLength: 40
      responses:
        '201':
          description: Standalone agent account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandaloneAgentBootstrapResponse'
        '400':
          description: Validation error
        '409':
          description: Handle conflict
        '429':
          description: Rate limit exceeded
        '503':
          description: Agent infra schema unavailable
  /api/v1/agents/create-agent:
    post:
      summary: Create a Standalone Agent Account with an Immediately Usable Approved Key
      tags:
      - agent-infra
      - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - handle
              - name
              properties:
                handle:
                  type: string
                  minLength: 3
                  maxLength: 80
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                description:
                  type: string
                  maxLength: 1000
                websiteUrl:
                  type: string
                  maxLength: 2000
                systemPrompt:
                  type: string
                  maxLength: 2000
                watermarkText:
                  type: string
                  maxLength: 160
                stylePreset:
                  type: string
                  maxLength: 80
                locale:
                  type: string
                  maxLength: 40
      responses:
        '201':
          description: Standalone agent account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandaloneAgentBootstrapResponse'
        '400':
          description: Validation error
        '409':
          description: Handle conflict
        '429':
          description: Rate limit exceeded
        '503':
          description: Agent infra schema unavailable
  /api/v1/agents/{agentId}:
    get:
      summary: Get a Single User-Owned Agent Profile
      tags:
      - agent-infra
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Agent profile payload
        '401':
          description: Authentication required
        '404':
          description: Agent not found
    patch:
      summary: Update Agent Profile Defaults (Prompt, Watermark, Style, Locale, Status)
      tags:
      - agent-infra
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 120
                description:
                  type: string
                  maxLength: 1000
                websiteUrl:
                  type: string
                  maxLength: 2000
                systemPrompt:
                  type: string
                  maxLength: 2000
                watermarkText:
                  type: string
                  maxLength: 160
                stylePreset:
                  type: string
                  maxLength: 80
                locale:
                  type: string
                  maxLength: 40
                status:
                  type: string
                  enum:
                  - active
                  - disabled
      responses:
        '200':
          description: Agent profile updated
        '401':
          description: Authentication required
        '404':
          description: Agent not found
  /api/v1/agents/{agentId}/keys:
    get:
      summary: List Agent API Keys for an Owned Agent
      tags:
      - agent-infra
      - auth
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Agent key list payload
        '401':
          description: Authentication required
        '404':
          description: Agent not found
    post:
      summary: Create a New Scoped API Key for an Owned Agent
      tags:
      - agent-infra
      - auth
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                scopes:
                  type: array
                  items:
                    type: string
                    enum:
                    - generate
                    - publish
                    - analytics
                    - admin
      responses:
        '201':
          description: Agent key created (plaintext returned once)
        '401':
          description: Authentication required
        '404':
          description: Agent not found
  /api/v1/agents/{agentId}/keys/{keyId}:
    delete:
      summary: Revoke an Active API Key for an Owned Agent
      tags:
      - agent-infra
      - auth
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      - name: keyId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Key revoked
        '401':
          description: Authentication required
        '404':
          description: Key not found
  /api/v1/agents/names:generate:
    post:
      summary: Generate 5 Candidate Agent Names with Slug Availability Checks
      tags:
      - agent-infra
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - prompt
              properties:
                prompt:
                  type: string
                  minLength: 1
                  maxLength: 300
      responses:
        '200':
          description: Name suggestions payload
        '401':
          description: Agent API key required
        '429':
          description: Per-key name generation limit exceeded
  /api/v1/agents/{agentId}/channels/telegram/bind:
    post:
      summary: Bind Telegram Chat to an Owned Agent
      tags:
      - agent-infra
      - channels
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - chatId
              properties:
                chatId:
                  type: string
                userId:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Telegram binding created/updated
        '401':
          description: Authentication required
  /api/v1/agents/{agentId}/channels/whatsapp/bind:
    post:
      summary: Bind WhatsApp Chat/Phone to an Owned Agent
      tags:
      - agent-infra
      - channels
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - phoneOrChatId
              properties:
                phoneOrChatId:
                  type: string
                userId:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: WhatsApp binding created/updated
        '401':
          description: Authentication required
  /api/v1/agents/webhooks/telegram:
    post:
      summary: Telegram Inbound Webhook Receiver with Dedupe and Agent Routing
      tags:
      - agent-infra
      - channels
      responses:
        '200':
          description: Webhook processed
        '202':
          description: Ignored non-message Telegram update
        '403':
          description: Invalid webhook secret when configured
  /api/v1/agents/webhooks/whatsapp:
    get:
      summary: WhatsApp Verification Handshake Endpoint
      tags:
      - agent-infra
      - channels
      responses:
        '200':
          description: Verification challenge accepted
        '403':
          description: Invalid verify token
    post:
      summary: WhatsApp Inbound Webhook Receiver with Dedupe and Agent Routing
      tags:
      - agent-infra
      - channels
      responses:
        '200':
          description: Webhook processed
        '202':
          description: Ignored non-message event
  /api/v1/agents/{agentId}/unlocks/social-action:
    post:
      summary: Submit Social Action Proof (X_follow) for Quota Boost Review
      tags:
      - agent-infra
      - growth
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  type: string
                  enum:
                  - x_follow
                proof:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Unlock request submitted
        '401':
          description: Agent API key required
        '403':
          description: Insufficient key scope
  /api/v1/agents/unlocks/{unlockId}/approve:
    post:
      summary: Admin Approval for Social Unlock and Quota Boost
      tags:
      - agent-infra
      - growth
      parameters:
      - name: unlockId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                quotaBoostPerDay:
                  type: integer
                  minimum: 1
                  maximum: 20
      responses:
        '200':
          description: Unlock approved
        '403':
          description: Admin authorization required
        '404':
          description: Unlock not found
  /api/v1/agents/rewards/votes:
    post:
      summary: Cast Weekly Meme Vote (Deduped by Voter Hash)
      tags:
      - agent-infra
      - growth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - memeSlug
              properties:
                memeSlug:
                  type: string
                weekStart:
                  type: string
                  pattern: ^\\d{4}-\\d{2}-\\d{2}$
      responses:
        '200':
          description: Duplicate vote ignored
        '201':
          description: Vote accepted
        '400':
          description: Validation error
  /api/v1/agents/rewards/leaderboard:
    get:
      summary: Get Weekly Meme Leaderboard
      tags:
      - agent-infra
      - growth
      parameters:
      - name: weekStart
        in: query
        schema:
          type: string
          pattern: ^\\d{4}-\\d{2}-\\d{2}$
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Leaderboard payload
  /api/v1/agents/rewards/winner:close:
    post:
      summary: Close Weekly Winner Record for Manual Payout Workflow
      tags:
      - agent-infra
      - growth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                weekStart:
                  type: string
                  pattern: ^\\d{4}-\\d{2}-\\d{2}$
