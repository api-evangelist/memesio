components:
  schemas:
    AiJobSubmitRequest:
      type: object
      required:
      - capability
      properties:
        capability:
          type: string
          enum:
          - face_swap
          - background_remove
          - caption_generate
        input:
          type: object
          additionalProperties: true
        maxAttempts:
          type: integer
          minimum: 1
          maximum: 10
        timeoutMs:
          type: integer
          minimum: 1000
          maximum: 300000
        runAfterMs:
          type: integer
          minimum: 0
        traceId:
          type: string
          pattern: ^[a-f0-9]{32}$
        actorId:
          type: string
        workspaceId:
          type: string
    AiJob:
      type: object
      required:
      - id
