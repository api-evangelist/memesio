openapi: 3.1.0
info:
  title: Memesio API Contracts agent-infra finops API
  version: 0.1.0
  description: Contract baseline for AI jobs, trend alerts, collaboration, and billing surfaces.
servers:
- url: /
tags:
- name: finops
paths:
  /api/analytics/anomalies/ai:
    get:
      summary: Run AI Cost/Failure Anomaly Detection and Return Alert State
      tags:
      - finops
      responses:
        '200':
          description: AI anomaly detection summary
components:
  securitySchemes:
    DeveloperApiKeyAuth:
      type: apiKey
      in: header
      name: x-developer-api-key
      description: 'Optional higher-rate free-tier auth. You can also send the key as Authorization: Bearer <key>.'
    AgentApiKeyAuth:
      type: apiKey
      in: header
      name: x-agent-api-key
      description: 'Agent auth for free endpoints and agent-admin routes. You can also send the key as Authorization: Bearer <key>.'
