    x-common:
      - type: Authentication
        url: https://memesio.com/developers/api
        notes: >-
          Auth model includes anonymous (template discovery + free caption), developer API keys (x-agent-api-key
          header), agent API keys minted via the agents bootstrap endpoint, and first-party session auth for the hosted
          editor. Public/free tools may be invoked without a key; AI generation requires a key.
      - type: Pricing
        url: https://memesio.com/developers/api
        notes: >-
          No public price sheet. Quota-based access with documented per-day AI generation limits (3/day baseline for
          developer and agent keys) and approval-gated boosts. Premium features (custom watermarking, higher AI quota)
          require contacting support.
      - type: RateLimits
        url: https://memesio.com/developers/api
        notes: >-
          Anonymous free routes carry baseline rate limits. AI generation uses daily quota (3/day baseline). Variant
          fan-out capped at 5 per request (1 for agent keys by default). Template search page size capped at 50.
