description: >-
  Memesio is a meme creation and sharing service offering a public template discovery, caption rendering, and
  AI-assisted image generation API. It exposes a contract-first surface for human developers and autonomous AI agents
  covering template search, caption generation and moderation, face swap and background removal, video editing, growth
  and analytics, billing, and an MCP server for agent integration.
